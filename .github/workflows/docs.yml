name: Deploy Documentation

on:
  push:
    tags:
      - v*

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  docs:
    runs-on: ubuntu-latest
    needs: [] # Add [lint, test] once this workflow is merged into main.yml
    steps:
      - uses: actions/checkout@v5

      - name: Install rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build fe
        run: cargo build --release --locked

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate docs.json
        run: |
          mkdir -p /tmp/docs-out
          timeout 300 ./target/release/fe doc --builtins -o /tmp/docs-out json
          # Verify schema_version is present
          python3 -c "
          import json, sys
          with open('/tmp/docs-out/docs.json') as f:
            d = json.load(f)
          sv = d.get('schema_version')
          if sv is None:
            print('ERROR: docs.json missing schema_version', file=sys.stderr)
            sys.exit(1)
          items = len(d.get('index', {}).get('items', []))
          print(f'schema_version: {sv}, items: {items}')
          "

      - name: Generate fe-web.js bundle
        run: |
          mkdir -p /tmp/bundle-out
          ./target/release/fe doc -o /tmp/bundle-out bundle --with-css

      - name: Checkout doc site repo
        uses: actions/checkout@v5
        with:
          repository: fe-lang/fe-doc
          token: ${{ secrets.DOC_DEPLOY_TOKEN }}
          path: fe-doc
          ref: gh-pages

      - name: Deploy docs
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd fe-doc
          chmod +x deploy.sh
          ./deploy.sh "$VERSION" /tmp/docs-out/docs.json /tmp/bundle-out/

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd fe-doc
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy docs for v$VERSION"
            git push
          fi
